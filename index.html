<!doctype html>
<html lang="us">
<head>
	<meta charset="utf-8">
	<title>Number Board</title>
	<link href='http://fonts.googleapis.com/css?family=Pacifico' rel='stylesheet' type='text/css'>
	<script>
		if (typeof window.parity !== 'undefined') {
			window.parity.api._transport._connectTimeout = -1;
			window.parity.api._subscriptions.subscribe = () => Promise.resolve(1);
		} else if (typeof web3 !== 'undefined') {
			window.ethereum = web3.currentProvider;
		} else {
	    	console.log('No web3? You should consider trying MetaMask!')
	  	}
	</script>
</head>
<body>
	<div id="app"></div>
	<script src="bundle.js"></script>
</body>
</html>
